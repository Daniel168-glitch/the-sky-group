<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THE SKY GROUP — Where the Horizon Meets Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ────────────────────────────────────
       TOKEN SYSTEM                        
    ──────────────────────────────────── */
    :root {
      --cream:        #F5F0E8;
      --cream-dark:   #EDE6D6;
      --brown-deep:   #2C1F14;
      --brown-mid:    #6B4226;
      --gold:         #C9964A;
      --gold-light:   #E8C07A;
      --sunset-1:     #1A0A00;   /* near-black */
      --sunset-2:     #3D1C06;
      --sunset-3:     #7A3310;
      --sunset-4:     #C2561A;
      --text-body:    #3A2D22;
      --text-muted:   #7A6A5A;

      --ff-serif:  'Playfair Display', Georgia, serif;
      --ff-sans:   'Poppins', system-ui, sans-serif;

      --radius:    4px;
      --transition: 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--ff-sans);
      color: var(--text-body);
      background: var(--cream);
      overflow-x: hidden;
    }

    img { display: block; width: 100%; }

    /* ────────────────────────────────────
       NAV
    ──────────────────────────────────── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 4rem;
      background: linear-gradient(to bottom, rgba(0,0,0,0.45) 0%, transparent 100%);
      transition: background var(--transition), padding var(--transition);
    }

    .nav.scrolled {
      background: rgba(26, 10, 0, 0.92);
      backdrop-filter: blur(10px);
      padding: 1rem 4rem;
    }

    .nav-logo {
      font-family: var(--ff-serif);
      font-size: 1.25rem; /* ขยายขึ้น */
      font-weight: 700;
      letter-spacing: 0.25em;
      color: #fff;
      text-decoration: none;
    }

    .nav-logo span {
      color: var(--gold-light);
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      font-family: var(--ff-sans);
      font-size: 0.8rem; /* ขยายขึ้น */
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      transition: color 0.25s;
    }

    .nav-links a:hover { color: var(--gold-light); }

    .nav-cta {
      font-family: var(--ff-sans);
      font-size: 0.75rem; /* ขยายขึ้น */
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--brown-deep);
      background: var(--gold-light);
      border: none;
      padding: 0.65rem 1.5rem;
      border-radius: var(--radius);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.25s, color 0.25s;
    }

    .nav-cta:hover { background: #fff; color: var(--brown-mid); }

    /* hamburger (mobile) */
    .nav-burger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }
    .nav-burger span {
      display: block;
      width: 24px;
      height: 2px;
      background: #fff;
      transition: var(--transition);
    }

    /* ────────────────────────────────────
       SECTION 1 — HERO
    ──────────────────────────────────── */
    .hero {
      position: relative;
      height: 100vh;
      min-height: 600px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1800&q=80');
      background-size: cover;
      background-position: center 40%;
      transform: scale(1.05);
      transition: transform 8s ease-out;
    }

    .hero-bg.loaded { transform: scale(1); }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        170deg,
        rgba(26,10,0,0.25) 0%,
        rgba(26,10,0,0.55) 60%,
        rgba(26,10,0,0.75) 100%
      );
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
      max-width: 860px;
    }

    .hero-eyebrow {
      font-family: var(--ff-sans);
      font-size: 0.75rem; /* ขยายขึ้น */
      font-weight: 400;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--gold-light);
      margin-bottom: 1.4rem;
      opacity: 0;
      animation: fadeUp 1s 0.3s forwards;
    }

    .hero-title {
      font-family: var(--ff-serif);
      font-size: clamp(3.5rem, 8vw, 7.5rem); /* ขยายขึ้นนิดนึง */
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 1.6rem;
      opacity: 0;
      animation: fadeUp 1s 0.55s forwards;
    }

    .hero-title em {
      font-style: italic;
      font-weight: 400;
      color: var(--gold-light);
    }

    .hero-sub {
      font-family: var(--ff-sans);
      font-size: 1.1rem; /* ขยายขึ้น */
      font-weight: 300;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.75);
      margin-bottom: 2.8rem;
      line-height: 1.9;
      opacity: 0;
      animation: fadeUp 1s 0.8s forwards;
    }

    .hero-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 1s 1.05s forwards;
    }

    .btn-primary {
      display: inline-block;
      font-family: var(--ff-sans);
      font-size: 0.8rem; /* ขยายขึ้น */
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--brown-deep);
      background: var(--gold-light);
      padding: 1rem 2.4rem;
      border-radius: var(--radius);
      text-decoration: none;
      transition: background 0.25s, transform 0.2s;
    }
    .btn-primary:hover { background: #fff; transform: translateY(-2px); }

    .btn-ghost {
      display: inline-block;
      font-family: var(--ff-sans);
      font-size: 0.8rem; /* ขยายขึ้น */
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.5);
      padding: 1rem 2.4rem;
      border-radius: var(--radius);
      text-decoration: none;
      transition: border-color 0.25s, background 0.25s, transform 0.2s;
    }
    .btn-ghost:hover {
      border-color: var(--gold-light);
      color: var(--gold-light);
      transform: translateY(-2px);
    }

    .hero-scroll {
      position: absolute;
      bottom: 1rem; /* ปรับเลื่อนลงมาให้บาลานซ์ (จากเดิม 2.2rem) */
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: fadeUp 1s 1.4s forwards;
    }

    .hero-scroll span {
      font-size: 0.65rem; /* ขยายขึ้น */
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }

    .scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.5), transparent);
      animation: scrollPulse 2s 2s infinite;
    }

    /* ────────────────────────────────────
       DIVIDER ORNAMENT
    ──────────────────────────────────── */
    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 0.5rem 0;
    }

    .ornament-line {
      width: 60px;
      height: 1px;
      background: var(--gold);
      opacity: 0.5;
    }

    .ornament-diamond {
      width: 6px;
      height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
    }

    /* ────────────────────────────────────
       SECTION 2 — PHILOSOPHY
    ──────────────────────────────────── */
    .philosophy {
      background: var(--cream);
      padding: 8rem 2rem;
      text-align: center;
    }

    .philosophy-inner {
      max-width: 720px;
      margin: 0 auto;
    }

    .section-eyebrow {
      font-family: var(--ff-sans);
      font-size: 0.75rem; /* ขยายขึ้น */
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
    }

    .section-title {
      font-family: var(--ff-serif);
      font-size: clamp(2.5rem, 4.5vw, 3.5rem); /* ขยายขึ้น */
      font-weight: 600;
      line-height: 1.2;
      color: var(--brown-deep);
      margin-bottom: 2rem;
    }

    .section-title em {
      font-style: italic;
      font-weight: 400;
      color: var(--brown-mid);
    }

    .philosophy-body {
      font-size: 1.1rem; /* ขยายขึ้น */
      font-weight: 300;
      line-height: 2;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .philosophy-quote {
      margin: 3rem auto;
      padding: 2rem 2.5rem;
      border-left: 2px solid var(--gold);
      text-align: left;
    }

    .philosophy-quote blockquote {
      font-family: var(--ff-serif);
      font-size: 1.5rem; /* ขยายขึ้น */
      font-style: italic;
      font-weight: 400;
      line-height: 1.6;
      color: var(--brown-deep);
    }

    .philosophy-quote cite {
      display: block;
      margin-top: 0.8rem;
      font-family: var(--ff-sans);
      font-size: 0.8rem; /* ขยายขึ้น */
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      font-style: normal;
    }

    .philosophy-pillars {
      display: flex;
      justify-content: center;
      gap: 3rem;
      margin-top: 4rem;
      flex-wrap: wrap;
    }

    .pillar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      max-width: 160px;
    }

    .pillar-icon {
      font-size: 1.6rem;
      line-height: 1;
      color: var(--gold);
    }

    .pillar h4 {
      font-family: var(--ff-serif);
      font-size: 1.1rem; /* ขยายขึ้น */
      font-weight: 600;
      color: var(--brown-deep);
    }

    .pillar p {
      font-size: 0.85rem; /* ขยายขึ้น */
      font-weight: 300;
      line-height: 1.7;
      color: var(--text-muted);
      text-align: center;
    }

    /* ────────────────────────────────────
       SECTION 3 — RESTAURANTS
    ──────────────────────────────────── */
    .restaurants {
      background: var(--cream-dark);
      padding: 7rem 2rem;
    }

    .restaurants-header {
      text-align: center;
      max-width: 560px;
      margin: 0 auto 4rem;
    }

    .restaurant-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Feature card — spans 2 cols on first row */
    .restaurant-card {
      position: relative;
      overflow: hidden;
      border-radius: calc(var(--radius) * 2);
      background: #111;
      cursor: pointer;
    }

    .restaurant-card:first-child {
      grid-column: span 2;
    }

    .restaurant-card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      aspect-ratio: 4/3;
      transition: transform var(--transition);
    }

    .restaurant-card:first-child .restaurant-card-img {
      aspect-ratio: 16/9;
    }

    .restaurant-card:hover .restaurant-card-img {
      transform: scale(1.06);
    }

    .restaurant-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(26, 10, 0, 0.88) 0%,
        rgba(26, 10, 0, 0.3) 45%,
        transparent 70%
      );
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1.8rem;
      opacity: 0.7;
      transition: opacity var(--transition);
    }

    .restaurant-card:hover .restaurant-card-overlay {
      opacity: 1;
    }

    .card-tag {
      font-family: var(--ff-sans);
      font-size: 0.7rem; /* ขยายขึ้น */
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold-light);
      margin-bottom: 0.4rem;
    }

    .card-name {
      font-family: var(--ff-serif);
      font-size: 1.6rem; /* ขยายขึ้น */
      font-weight: 600;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 0.5rem;
      transform: translateY(6px);
      transition: transform var(--transition);
    }

    .restaurant-card:hover .card-name {
      transform: translateY(0);
    }

    .card-location {
      font-family: var(--ff-sans);
      font-size: 0.8rem; /* ขยายขึ้น */
      font-weight: 300;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.05em;
      transform: translateY(8px);
      opacity: 0;
      transition: transform var(--transition), opacity var(--transition);
    }

    .restaurant-card:hover .card-location {
      transform: translateY(0);
      opacity: 1;
    }

    .card-arrow {
      display: inline-block;
      margin-top: 0.9rem;
      font-size: 0.75rem; /* ขยายขึ้น */
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold-light);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity var(--transition), transform var(--transition);
    }

    .restaurant-card:hover .card-arrow {
      opacity: 1;
      transform: translateY(0);
    }

    /* ────────────────────────────────────
       SECTION 4 — FOOTER
    ──────────────────────────────────── */
    footer {
      background: linear-gradient(
        160deg,
        var(--sunset-1) 0%,
        var(--sunset-2) 35%,
        var(--sunset-3) 72%,
        var(--sunset-4) 100%
      );
      color: rgba(255,255,255,0.75);
      padding: 5rem 4rem 2rem;
    }

    .footer-top {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr 1.2fr;
      gap: 3rem;
      padding-bottom: 3rem;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      margin-bottom: 2rem;
    }

    .footer-brand-logo {
      font-family: var(--ff-serif);
      font-size: 1.6rem; /* ขยายขึ้น */
      font-weight: 700;
      letter-spacing: 0.2em;
      color: #fff;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .footer-brand-logo span { color: var(--gold-light); }

    .footer-brand p {
      font-size: 0.9rem; /* ขยายขึ้น */
      font-weight: 300;
      line-height: 1.85;
      color: rgba(255,255,255,0.55);
      max-width: 240px;
    }

    .footer-socials {
      display: flex;
      gap: 0.8rem;
      margin-top: 1.5rem;
    }

    .social-btn {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem; /* ขยายขึ้น */
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      transition: border-color 0.25s, color 0.25s;
    }

    .social-btn:hover {
      border-color: var(--gold-light);
      color: var(--gold-light);
    }

    .footer-col h5 {
      font-family: var(--ff-sans);
      font-size: 0.75rem; /* ขยายขึ้น */
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold-light);
      margin-bottom: 1.4rem;
    }

    .footer-col ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .footer-col ul a {
      font-size: 0.9rem; /* ขยายขึ้น */
      font-weight: 300;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-col ul a:hover { color: var(--gold-light); }

    .footer-contact-item {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      margin-bottom: 1rem;
    }

    .footer-contact-item .label {
      font-size: 0.7rem; /* ขยายขึ้น */
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-light);
      opacity: 0.7;
    }

    .footer-contact-item .value {
      font-size: 0.9rem; /* ขยายขึ้น */
      font-weight: 300;
      color: rgba(255,255,255,0.7);
    }

    .footer-newsletter {
      margin-top: 0.5rem;
    }

    .newsletter-input-wrap {
      display: flex;
      margin-top: 0.8rem;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .newsletter-input-wrap input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: none;
      outline: none;
      padding: 0.65rem 0.9rem;
      font-family: var(--ff-sans);
      font-size: 0.85rem; /* ขยายขึ้น */
      font-weight: 300;
      color: #fff;
    }

    .newsletter-input-wrap input::placeholder { color: rgba(255,255,255,0.3); }

    .newsletter-input-wrap button {
      background: var(--gold);
      border: none;
      padding: 0 1rem;
      cursor: pointer;
      font-size: 0.8rem; /* ขยายขึ้น */
      color: var(--brown-deep);
      font-weight: 500;
      letter-spacing: 0.1em;
      transition: background 0.2s;
    }

    .newsletter-input-wrap button:hover { background: var(--gold-light); }

    .footer-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
